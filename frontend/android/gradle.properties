# Phase 4.16 follow-up — perf tuning. The host has 80 logical CPUs across
# 2 Windows processor groups; the JVM only sees one group (warning every
# build), so we cap ActiveProcessorCount to one socket's worth (20). The
# old config also had no parallel/cache, so Gradle was running serial.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:ActiveProcessorCount=20

# Run tasks concurrently across modules.
org.gradle.parallel=true

# Cache compiled task outputs across builds (big win on repeat builds).
org.gradle.caching=true

# Cap the Gradle worker pool. Spawning 20 workers on a 20-core box is
# the right tradeoff — beyond that you're paying JVM startup tax for
# no gain.
org.gradle.workers.max=20

# Daemon stays warm between invocations. Default is true on modern
# Gradle; spelling it out so it survives Gradle upgrades.
org.gradle.daemon=true

# Configuration cache — skips re-running build scripts when nothing
# config-relevant changed. Cuts seconds off no-op rebuilds.
org.gradle.configuration-cache=true

android.useAndroidX=true
