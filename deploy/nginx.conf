# Static SPA shell + reverse proxy to the API container on the docker network.
# Mounted at /etc/nginx/conf.d/default.conf inside the `web` service.

server {
  listen 80;
  server_name _;

  # SPA assets — try the requested path, fall back to index.html for client routing.
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy — same-origin keeps CORS simple.
  location /api/ {
    proxy_pass         http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # File uploads — also served directly by the API container.
  location /uploads/ {
    proxy_pass         http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
  }

  # Long-cache static assets, no-cache index.html.
  location = /index.html { add_header Cache-Control "no-store"; }
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|webp)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
